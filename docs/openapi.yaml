openapi: 3.0.3

info:
  title: Wanderlust API
  description: |
    REST API for the Wanderlust travel-listing platform.

    ## Authentication
    All write operations (create, update, delete) require an active session.
    Log in via `POST /api/auth/login` — the server sets a **session cookie**
    (`connect.sid`) which must be included in every subsequent request.

    Browser clients handle this automatically.  
    API / curl clients should use `--cookie-jar` / `credentials: "include"`.

    ## Email Verification
    After signup, a verification email is sent automatically. Some actions
    (e.g. creating a listing) require a verified email address. Use
    `POST /api/auth/resend-verification` to request a new link.

    ## OAuth
    Google and GitHub OAuth are supported. Initiate via `GET /api/auth/google`
    or `GET /api/auth/github`. Authenticated users can link/unlink additional
    providers via the `/api/auth/link/*` and `DELETE /api/auth/unlink/:provider`
    endpoints.

    ## Rate Limits
    | Scope | Window | Max requests |
    |---|---|---|
    | Global (all routes) | 15 min | 200 |
    | Auth (`/signup`, `/login`, `/forgot-password`) | 15 min | 20 |
    | Create listings / reviews | 1 hour | 30 |
    | Resend verification email | 1 hour | 5 per IP; 5 min cooldown per user |

    Exceeded limits return **429 Too Many Requests**.

  version: "3.1.0"
  contact:
    name: Akshar Gupta
  license:
    name: ISC

servers:
  - url: http://localhost:8080
    description: Local development
  - url: https://your-production-domain.com
    description: Production (replace with your actual domain)

tags:
  - name: Health
    description: Service liveness check
  - name: Auth
    description: Session-based authentication, OAuth, password recovery, email verification
  - name: Listings
    description: Travel listing CRUD, images, availability calendar
  - name: Reviews
    description: Reviews nested under listings
  - name: Users
    description: User profiles, settings, avatar, notifications

# ─────────────────────────────────────────────────────────────────────────────
# Reusable components
# ─────────────────────────────────────────────────────────────────────────────
components:
  # ── Security ──────────────────────────────────────────────────────────────
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: connect.sid
      description: |
        Session cookie set by `POST /api/auth/login` or an OAuth callback.  
        Swagger UI sends it automatically after a successful login when
        `withCredentials` is enabled.

  # ── Shared parameters ─────────────────────────────────────────────────────
  parameters:
    listingId:
      name: id
      in: path
      required: true
      schema:
        type: string
        pattern: "^[a-f0-9]{24}$"
      description: MongoDB ObjectId of the listing
      example: "6648a1f2c3d4e5f6a7b8c9d0"

    listingIdNested:
      name: listingId
      in: path
      required: true
      schema:
        type: string
        pattern: "^[a-f0-9]{24}$"
      description: MongoDB ObjectId of the parent listing
      example: "6648a1f2c3d4e5f6a7b8c9d0"

    reviewId:
      name: reviewId
      in: path
      required: true
      schema:
        type: string
        pattern: "^[a-f0-9]{24}$"
      description: MongoDB ObjectId of the review
      example: "6648b2e3d4f5a6b7c8d9e0f1"

    username:
      name: username
      in: path
      required: true
      schema:
        type: string
        maxLength: 30
      description: Username of the target user
      example: "alice"

    imageId:
      name: imageId
      in: path
      required: true
      schema:
        type: string
        pattern: "^[a-f0-9]{24}$"
      description: MongoDB ObjectId of the image sub-document
      example: "6648c3f4e5a6b7c8d9e0f1a2"

    blockedDateId:
      name: blockedDateId
      in: path
      required: true
      schema:
        type: string
        pattern: "^[a-f0-9]{24}$"
      description: MongoDB ObjectId of the blocked-date sub-document
      example: "6648d4e5f6a7b8c9d0e1f2a3"

    slug:
      name: slug
      in: path
      required: true
      schema:
        type: string
        maxLength: 80
      description: URL-safe slug auto-generated from the listing title
      example: "mountain-retreat"

    provider:
      name: provider
      in: path
      required: true
      schema:
        type: string
        enum: [google, github]
      description: OAuth provider to unlink
      example: "google"

  # ── Schemas ───────────────────────────────────────────────────────────────
  schemas:
    # Primitives
    ObjectId:
      type: string
      pattern: "^[a-f0-9]{24}$"
      example: "6648a1f2c3d4e5f6a7b8c9d0"

    ListingCategory:
      type: string
      enum:
        - trending
        - rooms
        - iconic
        - mountains
        - castles
        - pools
        - camping
        - farms
        - arctic
        - domes
        - boats
      example: mountains

    PropertyType:
      type: string
      enum:
        - apartment
        - house
        - villa
        - cottage
        - cabin
        - studio
        - loft
        - treehouse
        - boat
        - camper
        - tent
        - bungalow
        - chalet
        - castle
        - farm
        - other
      example: cabin

    GeoPoint:
      type: object
      required: [type, coordinates]
      properties:
        type:
          type: string
          enum: [Point]
        coordinates:
          type: array
          items:
            type: number
          minItems: 2
          maxItems: 2
          description: "[longitude, latitude]"
          example: [-106.8175, 39.1911]

    # ── Image sub-documents ───────────────────────────────────────────────────
    Image:
      type: object
      description: Legacy single-image field (kept for backward compatibility)
      properties:
        url:
          type: string
          format: uri
          example: "https://res.cloudinary.com/demo/image/upload/sample.jpg"
        filename:
          type: string
          example: "wanderlust_DEV/xkcd1234"

    ListingImage:
      type: object
      description: Entry in the listing's images[] array
      properties:
        _id:
          $ref: "#/components/schemas/ObjectId"
        url:
          type: string
          format: uri
          example: "https://res.cloudinary.com/demo/image/upload/sample.jpg"
        filename:
          type: string
          example: "wanderlust_DEV/xkcd1234"
        caption:
          type: string
          nullable: true
          example: "View from the balcony"
        isPrimary:
          type: boolean
          example: true

    # ── Pricing ───────────────────────────────────────────────────────────────
    Pricing:
      type: object
      properties:
        nightlyPrice:
          type: number
          minimum: 0
          example: 1000
        cleaningFee:
          type: number
          minimum: 0
          example: 90
        serviceFee:
          type: number
          minimum: 0
          example: 50
        taxes:
          type: number
          minimum: 0
          example: 100

    # ── House Rules ───────────────────────────────────────────────────────────
    HouseRules:
      type: object
      properties:
        checkInTime:
          type: string
          example: "15:00"
        checkOutTime:
          type: string
          example: "11:00"
        smokingAllowed:
          type: boolean
          example: false
        petsAllowed:
          type: boolean
          example: true
        partiesAllowed:
          type: boolean
          example: false
        quietHoursStart:
          type: string
          nullable: true
          example: "22:00"
        quietHoursEnd:
          type: string
          nullable: true
          example: "08:00"
        additionalRules:
          type: array
          items:
            type: string
          example: ["No shoes inside"]

    # ── Blocked Date (availability calendar entry) ────────────────────────────
    BlockedDate:
      type: object
      required: [startDate, endDate]
      properties:
        _id:
          $ref: "#/components/schemas/ObjectId"
        startDate:
          type: string
          format: date-time
          example: "2025-12-20T00:00:00.000Z"
        endDate:
          type: string
          format: date-time
          example: "2025-12-27T00:00:00.000Z"
        reason:
          type: string
          enum: [booked, blocked, maintenance]
          default: blocked
          example: blocked

    BlockedDateInput:
      type: object
      required: [startDate, endDate]
      properties:
        startDate:
          type: string
          format: date-time
          example: "2025-12-20T00:00:00.000Z"
        endDate:
          type: string
          format: date-time
          example: "2025-12-27T00:00:00.000Z"
        reason:
          type: string
          enum: [booked, blocked, maintenance]
          default: blocked

    # ── Avatar ───────────────────────────────────────────────────────────────
    Avatar:
      type: object
      nullable: true
      properties:
        url:
          type: string
          format: uri
          nullable: true
          example: "https://res.cloudinary.com/demo/image/upload/avatar.jpg"
        filename:
          type: string
          nullable: true
          example: "wanderlust_DEV/avatars/abc123"

    # ── Notification Preferences ─────────────────────────────────────────────
    NotificationPreferences:
      type: object
      properties:
        email:
          type: object
          properties:
            bookingRequests: { type: boolean, example: true }
            bookingUpdates: { type: boolean, example: true }
            newReviews: { type: boolean, example: true }
            promotions: { type: boolean, example: false }
            newsletter: { type: boolean, example: false }
        push:
          type: object
          properties:
            bookingRequests: { type: boolean, example: true }
            bookingUpdates: { type: boolean, example: true }
            newReviews: { type: boolean, example: true }
        sms:
          type: object
          properties:
            bookingRequests: { type: boolean, example: false }
            bookingUpdates: { type: boolean, example: true }

    # ── User Settings ─────────────────────────────────────────────────────────
    UserSettings:
      type: object
      properties:
        language:
          type: string
          enum: [en, hi, es, fr, de, ja, zh, ar]
          example: en
        currency:
          type: string
          enum: [INR, USD, EUR, GBP, JPY, AUD, CAD, SGD]
          example: INR
        timezone:
          type: string
          example: "Asia/Kolkata"
        theme:
          type: string
          enum: [light, dark, system]
          example: system
        twoFactorEnabled:
          type: boolean
          example: false
        profileVisibility:
          type: string
          enum: [public, private, hosts_only]
          example: public

    # ── User (public shape — visible to everyone) ─────────────────────────────
    UserPublic:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/ObjectId"
        username:
          type: string
          example: alice
        firstName:
          type: string
          nullable: true
          example: Alice
        lastName:
          type: string
          nullable: true
          example: Smith
        displayName:
          type: string
          nullable: true
          example: "Alice Smith"
        avatar:
          type: string
          format: uri
          nullable: true
          example: "https://res.cloudinary.com/demo/image/upload/avatar.jpg"
        bio:
          type: string
          nullable: true
          example: "Avid traveller and amateur photographer."
        role:
          type: string
          enum: [user, host, admin]
          example: host
        emailVerified:
          type: boolean
          example: true
        profileCompletion:
          type: integer
          minimum: 0
          maximum: 100
          example: 83
        isHost:
          type: boolean
          example: true
        totalListings:
          type: integer
          example: 5
        totalReviews:
          type: integer
          example: 42
        createdAt:
          type: string
          format: date-time

    # ── User (full shape — returned to the authenticated owner) ───────────────
    UserFull:
      allOf:
        - $ref: "#/components/schemas/UserPublic"
        - type: object
          properties:
            email:
              type: string
              format: email
              example: alice@example.com
            phoneNumber:
              type: string
              nullable: true
              example: "+919876543210"
            provider:
              type: string
              enum: [local, google, github]
              example: local
            linkedProviders:
              type: object
              description: Which login methods are active on this account
              properties:
                google: { type: boolean, example: false }
                github: { type: boolean, example: false }
                local: { type: boolean, example: true }
            notificationPreferences:
              $ref: "#/components/schemas/NotificationPreferences"
            settings:
              $ref: "#/components/schemas/UserSettings"
            lastLoginAt:
              type: string
              format: date-time
              nullable: true

    # ── Listing ─────────────────────────────────────────────────────────────
    Listing:
      type: object
      properties:
        _id:
          $ref: "#/components/schemas/ObjectId"
        title:
          type: string
          example: "Mountain Retreat"
        slug:
          type: string
          example: "mountain-retreat"
        description:
          type: string
          example: "Peaceful cabin surrounded by pines."
        shortDescription:
          type: string
          nullable: true
          maxLength: 160
          example: "Unplug in this peaceful mountain cabin surrounded by pristine nature."
        propertyType:
          $ref: "#/components/schemas/PropertyType"
        image:
          $ref: "#/components/schemas/Image"
        images:
          type: array
          items:
            $ref: "#/components/schemas/ListingImage"
        price:
          type: number
          minimum: 0
          example: 1000
          description: Synced from pricing.nightlyPrice (legacy field kept for compatibility)
        pricing:
          $ref: "#/components/schemas/Pricing"
        bedrooms:
          type: integer
          minimum: 0
          example: 3
        bathrooms:
          type: number
          minimum: 0
          example: 2
        beds:
          type: integer
          minimum: 0
          example: 4
        maxGuests:
          type: integer
          minimum: 1
          example: 6
        amenities:
          type: array
          items:
            type: string
          example: ["wifi", "kitchen", "heating", "mountain_view"]
        houseRules:
          $ref: "#/components/schemas/HouseRules"
        location:
          type: string
          example: "Aspen"
        country:
          type: string
          example: "United States"
        category:
          $ref: "#/components/schemas/ListingCategory"
        geometry:
          $ref: "#/components/schemas/GeoPoint"
        averageRating:
          type: number
          minimum: 0
          maximum: 5
          example: 4.7
        reviewCount:
          type: integer
          minimum: 0
          example: 12
        bookingCount:
          type: integer
          minimum: 0
          example: 34
        wishlistCount:
          type: integer
          minimum: 0
          example: 8
        status:
          type: string
          enum: [active, inactive, suspended, deleted]
          example: active
        draft:
          type: boolean
          example: false
        featured:
          type: boolean
          example: true
        minimumStay:
          type: integer
          minimum: 1
          example: 2
        maximumStay:
          type: integer
          nullable: true
          example: 30
        availabilityCalendar:
          type: array
          items:
            $ref: "#/components/schemas/BlockedDate"
        owner:
          $ref: "#/components/schemas/UserPublic"
        reviews:
          type: array
          items:
            $ref: "#/components/schemas/Review"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ListingInput:
      type: object
      required: [title, description, location, country, price, category]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 100
          example: "Mountain Retreat"
        description:
          type: string
          minLength: 1
          example: "Peaceful cabin surrounded by pines."
        shortDescription:
          type: string
          maxLength: 160
          nullable: true
          example: "Unplug in this peaceful mountain cabin."
        location:
          type: string
          minLength: 1
          example: "Aspen"
        country:
          type: string
          minLength: 1
          example: "United States"
        price:
          type: number
          minimum: 0
          example: 1000
        category:
          $ref: "#/components/schemas/ListingCategory"
        propertyType:
          $ref: "#/components/schemas/PropertyType"
        bedrooms:
          type: integer
          minimum: 0
          default: 1
        bathrooms:
          type: number
          minimum: 0
          default: 1
        beds:
          type: integer
          minimum: 0
          default: 1
        maxGuests:
          type: integer
          minimum: 1
          default: 2
        amenities:
          type: array
          items:
            type: string
          default: []
        houseRules:
          $ref: "#/components/schemas/HouseRules"
        pricing:
          $ref: "#/components/schemas/Pricing"
        status:
          type: string
          enum: [active, inactive, suspended, deleted]
          default: active
        draft:
          type: boolean
          default: false
        minimumStay:
          type: integer
          minimum: 1
          default: 1
        maximumStay:
          type: integer
          minimum: 1
          nullable: true

    ListingPatchInput:
      type: object
      minProperties: 1
      properties:
        title: { type: string, minLength: 1, maxLength: 100 }
        description: { type: string, minLength: 1 }
        shortDescription: { type: string, maxLength: 160, nullable: true }
        location: { type: string, minLength: 1 }
        country: { type: string, minLength: 1 }
        price: { type: number, minimum: 0 }
        category: { $ref: "#/components/schemas/ListingCategory" }
        propertyType: { $ref: "#/components/schemas/PropertyType" }
        bedrooms: { type: integer, minimum: 0 }
        bathrooms: { type: number, minimum: 0 }
        beds: { type: integer, minimum: 0 }
        maxGuests: { type: integer, minimum: 1 }
        amenities:
          type: array
          items: { type: string }
        houseRules: { $ref: "#/components/schemas/HouseRules" }
        pricing: { $ref: "#/components/schemas/Pricing" }
        status: { type: string, enum: [active, inactive, suspended, deleted] }
        draft: { type: boolean }
        featured: { type: boolean }
        minimumStay: { type: integer, minimum: 1 }
        maximumStay: { type: integer, minimum: 1, nullable: true }

    # ── Review ───────────────────────────────────────────────────────────────
    Review:
      type: object
      properties:
        _id:
          $ref: "#/components/schemas/ObjectId"
        rating:
          type: integer
          minimum: 1
          maximum: 5
          example: 4
        comment:
          type: string
          example: "Absolutely stunning views!"
        createdAt:
          type: string
          format: date-time
        author:
          $ref: "#/components/schemas/UserPublic"

    ReviewInput:
      type: object
      required: [rating, comment]
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
          example: 4
        comment:
          type: string
          minLength: 1
          example: "Absolutely stunning views!"

    ReviewPatchInput:
      type: object
      minProperties: 1
      properties:
        rating: { type: integer, minimum: 1, maximum: 5 }
        comment: { type: string, minLength: 1 }

    # ── Auth request bodies ──────────────────────────────────────────────────
    SignupBody:
      type: object
      required: [username, email, password]
      properties:
        username:
          type: string
          maxLength: 30
          minLength: 1
          example: alice
        email:
          type: string
          format: email
          example: alice@example.com
        password:
          type: string
          format: password
          minLength: 6
          example: "s3cr3tP@ss"
        firstName:
          type: string
          maxLength: 50
          example: Alice
        lastName:
          type: string
          maxLength: 50
          example: Smith

    LoginBody:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 1
          example: alice
        password:
          type: string
          format: password
          minLength: 1
          example: "s3cr3tP@ss"

    ForgotPasswordBody:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          example: alice@example.com

    ResetPasswordBody:
      type: object
      required: [token, password]
      properties:
        token:
          type: string
          minLength: 1
          description: Raw 64-character hex token from the reset email link
          example: "a3f9b2c1d4e5..."
        password:
          type: string
          format: password
          minLength: 6
          maxLength: 128
          example: "newS3cr3tP@ss"
        confirmPassword:
          type: string
          format: password
          description: "Optional — must match `password` if provided"
          example: "newS3cr3tP@ss"

    VerifyEmailBody:
      type: object
      required: [token]
      properties:
        token:
          type: string
          minLength: 1
          description: Raw 64-character hex token from the verification email link
          example: "b4e8c3d2e5f6..."

    # ── User update request bodies ───────────────────────────────────────────
    UpdateProfileBody:
      type: object
      minProperties: 1
      properties:
        firstName:
          type: string
          maxLength: 50
          nullable: true
          example: Alice
        lastName:
          type: string
          maxLength: 50
          nullable: true
          example: Smith
        bio:
          type: string
          maxLength: 500
          nullable: true
          example: "Avid traveller and amateur photographer."
        phoneNumber:
          type: string
          nullable: true
          example: "+919876543210"
          description: "E.164 format preferred: +[country][number]"

    UpdateSettingsBody:
      type: object
      minProperties: 1
      properties:
        language:
          type: string
          enum: [en, hi, es, fr, de, ja, zh, ar]
        currency:
          type: string
          enum: [INR, USD, EUR, GBP, JPY, AUD, CAD, SGD]
        timezone:
          type: string
          example: "Asia/Kolkata"
        theme:
          type: string
          enum: [light, dark, system]
        twoFactorEnabled:
          type: boolean
        profileVisibility:
          type: string
          enum: [public, private, hosts_only]

    UpdateNotificationsBody:
      type: object
      minProperties: 1
      properties:
        email:
          type: object
          properties:
            bookingRequests: { type: boolean }
            bookingUpdates: { type: boolean }
            newReviews: { type: boolean }
            promotions: { type: boolean }
            newsletter: { type: boolean }
        push:
          type: object
          properties:
            bookingRequests: { type: boolean }
            bookingUpdates: { type: boolean }
            newReviews: { type: boolean }
        sms:
          type: object
          properties:
            bookingRequests: { type: boolean }
            bookingUpdates: { type: boolean }

    ChangeRoleBody:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [user, host, admin]
          example: host

    # ── Pagination ───────────────────────────────────────────────────────────
    Pagination:
      type: object
      properties:
        total: { type: integer, example: 29 }
        page: { type: integer, example: 1 }
        limit: { type: integer, example: 20 }
        totalPages: { type: integer, example: 2 }

    # ── Response envelopes ───────────────────────────────────────────────────
    SuccessEnvelope:
      type: object
      properties:
        success: { type: boolean, example: true }
        data: { type: object }

    ErrorEnvelope:
      type: object
      properties:
        success: { type: boolean, example: false }
        message: { type: string, example: "Resource not found" }
        code: { type: string, example: "NOT_FOUND" }
        details:
          type: array
          items:
            type: object
            properties:
              field: { type: string }
              message: { type: string }

  # ── Reusable responses ─────────────────────────────────────────────────────
  responses:
    Unauthorized:
      description: Not authenticated — session cookie missing or expired
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
          example:
            success: false
            message: "Authentication required"
            code: "UNAUTHORIZED"

    Forbidden:
      description: Authenticated but not authorised for this resource
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
          example:
            success: false
            message: "You do not have permission"
            code: "FORBIDDEN"

    EmailNotVerified:
      description: Account email has not been verified
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
          example:
            success: false
            message: "Please verify your email address to continue."
            code: "EMAIL_NOT_VERIFIED"

    NotFound:
      description: Resource does not exist
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
          example:
            success: false
            message: "Resource not found"
            code: "NOT_FOUND"

    ValidationError:
      description: Request body failed schema validation
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
          example:
            success: false
            message: "Validation failed"
            code: "VALIDATION_ERROR"
            details:
              - field: "listing.title"
                message: "Title cannot be empty"

    BadRequest:
      description: Malformed request
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }

    TooManyRequests:
      description: Rate limit exceeded
      headers:
        RateLimit-Limit: { schema: { type: integer } }
        RateLimit-Remaining: { schema: { type: integer } }
        RateLimit-Reset: { schema: { type: integer } }
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
          example:
            success: false
            message: "Too many requests — please try again later."
            code: "RATE_LIMIT_EXCEEDED"

    InternalError:
      description: Unexpected server error
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
          example:
            success: false
            message: "Something went wrong"
            code: "INTERNAL_ERROR"

# ─────────────────────────────────────────────────────────────────────────────
# Paths
# ─────────────────────────────────────────────────────────────────────────────
paths:
  # ════════════════════════════════ HEALTH ════════════════════════════════════
  /api/health:
    get:
      tags: [Health]
      summary: Service liveness check
      operationId: healthCheck
      security: []
      responses:
        "200":
          description: Service is up
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    type: object
                    properties:
                      status: { type: string, example: ok }
                      ts: { type: string, format: date-time }

  # ════════════════════════════════ AUTH ══════════════════════════════════════
  /api/auth/signup:
    post:
      tags: [Auth]
      summary: Register a new account
      description: |
        Creates a local account and establishes a session. A verification email
        is sent automatically (fire-and-forget — signup succeeds even if email
        delivery fails). The account is functional immediately, but some actions
        require a verified email address.
      operationId: authSignup
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SignupBody" }
      responses:
        "201":
          description: Account created; session cookie set
          headers:
            Set-Cookie:
              schema:
                {
                  type: string,
                  example: "connect.sid=s%3A...; Path=/; HttpOnly; SameSite=Lax",
                }
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          message:
                            {
                              type: string,
                              example: "Account created successfully",
                            }
                          user: { $ref: "#/components/schemas/UserFull" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "422": { $ref: "#/components/responses/ValidationError" }
        "429": { $ref: "#/components/responses/TooManyRequests" }

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Log in with username and password
      operationId: authLogin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginBody" }
      responses:
        "200":
          description: Logged in; session cookie set
          headers:
            Set-Cookie: { schema: { type: string } }
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          message:
                            { type: string, example: "Logged in successfully" }
                          user: { $ref: "#/components/schemas/UserFull" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/ValidationError" }
        "429": { $ref: "#/components/responses/TooManyRequests" }

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: End the current session
      operationId: authLogout
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          message:
                            { type: string, example: "Logged out successfully" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalError" }

  /api/auth/me:
    get:
      tags: [Auth]
      summary: Return the currently authenticated user (full profile)
      operationId: authMe
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user: { $ref: "#/components/schemas/UserFull" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request a password reset email
      description: |
        Sends a reset link to the email address if a matching active account
        exists. Always returns 200 to prevent email enumeration — check `sent`
        in the response body.

        In non-production environments, the raw `_devToken` is included in the
        response for integration testing.
      operationId: authForgotPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ForgotPasswordBody" }
      responses:
        "200":
          description: Request acknowledged (regardless of whether the email exists)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          message:
                            type: string
                            example: "If that email address is registered, you will receive a password reset link shortly."
                          _devToken:
                            type: string
                            description: "Non-production only — raw token for testing"
        "422": { $ref: "#/components/responses/ValidationError" }
        "429": { $ref: "#/components/responses/TooManyRequests" }

  /api/auth/reset-password:
    post:
      tags: [Auth]
      summary: Consume a reset token and set a new password
      description: |
        The token is single-use and expires after 1 hour. Invalidates all
        other active reset tokens for the user on success.
      operationId: authResetPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ResetPasswordBody" }
      responses:
        "200":
          description: Password updated successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          message:
                            type: string
                            example: "Your password has been updated successfully. Please log in with your new password."
        "400": { $ref: "#/components/responses/BadRequest" }
        "422": { $ref: "#/components/responses/ValidationError" }
        "429": { $ref: "#/components/responses/TooManyRequests" }

  /api/auth/verify-email:
    post:
      tags: [Auth]
      summary: Verify email address using a token from the verification email
      description: |
        Marks the account's email as verified. The token is single-use and
        expires after 24 hours. If the session user is authenticated, the
        session is refreshed to reflect `emailVerified: true` immediately.
      operationId: authVerifyEmail
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/VerifyEmailBody" }
      responses:
        "200":
          description: Email verified
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          message:
                            {
                              type: string,
                              example: "Email address verified successfully.",
                            }
                          user: { $ref: "#/components/schemas/UserFull" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /api/auth/resend-verification:
    post:
      tags: [Auth]
      summary: Resend the email verification link
      description: |
        Issues a new verification token and sends it to the user's email.

        **Constraints:**
        - Requires an authenticated session.
        - Rejected if email is already verified.
        - Per-user cooldown: 5 minutes between requests.
        - Per-IP rate limit: 5 requests per hour (HTTP layer) + DB-level check.

        In non-production environments, `_devToken` is included for testing.
      operationId: authResendVerification
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Verification email sent
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          message:
                            type: string
                            example: "A new verification email has been sent. Please check your inbox."
                          _devToken:
                            type: string
                            description: "Non-production only — raw token for testing"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429": { $ref: "#/components/responses/TooManyRequests" }

  /api/auth/unlink/{provider}:
    delete:
      tags: [Auth]
      summary: Unlink an OAuth provider from the current account
      description: |
        Removes the stored provider ID so that OAuth login via that provider no
        longer works for this account.

        **Guard:** the request is rejected if the provider being unlinked is the
        only login method (no local password and no other linked provider).
      operationId: authUnlinkProvider
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/provider"
      responses:
        "200":
          description: Provider unlinked
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          message:
                            type: string
                            example: "google has been unlinked from your account"
                          user: { $ref: "#/components/schemas/UserFull" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/auth/google:
    get:
      tags: [Auth]
      summary: Initiate Google OAuth 2.0 login
      description: |
        Redirects to Google's consent screen. On success, Google redirects
        back to `GET /api/auth/google/callback`.

        Pass an optional `state` query parameter (base64-encoded JSON with a
        `redirectTo` field) to control the post-login redirect destination.
      operationId: authGoogleInit
      security: []
      parameters:
        - name: state
          in: query
          required: false
          schema:
            type: string
          description: 'Base64-encoded JSON, e.g. btoa(JSON.stringify({ redirectTo: "/dashboard" }))'
      responses:
        "302":
          description: Redirect to Google consent page

  /api/auth/google/callback:
    get:
      tags: [Auth]
      summary: Google OAuth 2.0 callback
      description: |
        Google redirects here after the user grants (or denies) consent.
        On success the session is established and the browser is redirected to
        the frontend. On failure the browser is redirected to
        `/login?auth_error=<reason>`.
      operationId: authGoogleCallback
      security: []
      responses:
        "302":
          description: Redirect to frontend (success or failure)

  /api/auth/github:
    get:
      tags: [Auth]
      summary: Initiate GitHub OAuth 2.0 login
      description: |
        Redirects to GitHub's authorization page. On success, GitHub redirects
        back to `GET /api/auth/github/callback`.
      operationId: authGithubInit
      security: []
      parameters:
        - name: state
          in: query
          required: false
          schema:
            type: string
          description: 'Base64-encoded JSON, e.g. btoa(JSON.stringify({ redirectTo: "/dashboard" }))'
      responses:
        "302":
          description: Redirect to GitHub authorization page

  /api/auth/github/callback:
    get:
      tags: [Auth]
      summary: GitHub OAuth 2.0 callback
      operationId: authGithubCallback
      security: []
      responses:
        "302":
          description: Redirect to frontend (success or failure)

  /api/auth/link/google:
    get:
      tags: [Auth]
      summary: Link Google to an existing authenticated account
      description: |
        Initiates the Google OAuth flow in "link" mode. The user must already
        be authenticated. The resulting `google/callback` will attach the
        Google ID to the current account instead of creating a new session.
      operationId: authLinkGoogle
      security:
        - cookieAuth: []
      responses:
        "302":
          description: Redirect to Google consent page
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/auth/link/github:
    get:
      tags: [Auth]
      summary: Link GitHub to an existing authenticated account
      operationId: authLinkGithub
      security:
        - cookieAuth: []
      responses:
        "302":
          description: Redirect to GitHub authorization page
        "401": { $ref: "#/components/responses/Unauthorized" }

  # ══════════════════════════════ LISTINGS ════════════════════════════════════
  /api/listings:
    get:
      tags: [Listings]
      summary: List all active listings (paginated, filterable)
      operationId: listingsIndex
      security: []
      parameters:
        - name: category
          in: query
          schema: { $ref: "#/components/schemas/ListingCategory" }
          description: Filter by category
        - name: propertyType
          in: query
          schema: { $ref: "#/components/schemas/PropertyType" }
          description: Filter by property type
        - name: featured
          in: query
          schema: { type: boolean }
          description: Filter to featured listings only
        - name: minPrice
          in: query
          schema: { type: number, minimum: 0 }
        - name: maxPrice
          in: query
          schema: { type: number, minimum: 0 }
        - name: minGuests
          in: query
          schema: { type: integer, minimum: 1 }
          description: Filter by minimum guest capacity (maps to maxGuests ≥ minGuests)
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - name: sort
          in: query
          schema:
            type: string
            enum: [createdAt, price_asc, price_desc, rating, popular]
            default: createdAt
      responses:
        "200":
          description: Paginated listing array
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          listings:
                            type: array
                            items: { $ref: "#/components/schemas/Listing" }
                          pagination:
                            { $ref: "#/components/schemas/Pagination" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalError" }

    post:
      tags: [Listings]
      summary: Create a new listing
      description: |
        Requires **host** or **admin** role and a **verified email address**.
        Subject to the create rate limit (30/hr per IP).
      operationId: listingsCreate
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - "listing[title]"
                - "listing[description]"
                - "listing[location]"
                - "listing[country]"
                - "listing[price]"
                - "listing[category]"
                - "listing[image]"
              properties:
                "listing[title]":
                  {
                    type: string,
                    minLength: 1,
                    maxLength: 100,
                    example: "Alpine Hideaway",
                  }
                "listing[description]": { type: string, minLength: 1 }
                "listing[shortDescription]":
                  { type: string, maxLength: 160, nullable: true }
                "listing[location]":
                  { type: string, minLength: 1, example: "Zermatt" }
                "listing[country]":
                  { type: string, minLength: 1, example: "Switzerland" }
                "listing[price]": { type: number, minimum: 0, example: 3200 }
                "listing[category]":
                  { $ref: "#/components/schemas/ListingCategory" }
                "listing[propertyType]":
                  { $ref: "#/components/schemas/PropertyType" }
                "listing[bedrooms]": { type: integer, minimum: 0, default: 1 }
                "listing[bathrooms]": { type: number, minimum: 0, default: 1 }
                "listing[beds]": { type: integer, minimum: 0, default: 1 }
                "listing[maxGuests]": { type: integer, minimum: 1, default: 2 }
                "listing[minimumStay]":
                  { type: integer, minimum: 1, default: 1 }
                "listing[maximumStay]":
                  { type: integer, minimum: 1, nullable: true }
                "listing[image]":
                  type: string
                  format: binary
                  description: Primary image — JPEG, JPG, PNG, or WebP (≤ 10 MB)
      responses:
        "201":
          description: Listing created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          listing: { $ref: "#/components/schemas/Listing" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          description: Forbidden — insufficient role or unverified email
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "422": { $ref: "#/components/responses/ValidationError" }
        "429": { $ref: "#/components/responses/TooManyRequests" }

  /api/listings/featured:
    get:
      tags: [Listings]
      summary: Get featured listings
      description: "Returns listings where `featured: true`, sorted by `averageRating` descending."
      operationId: listingsFeatured
      security: []
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 50, default: 10 }
      responses:
        "200":
          description: Featured listings
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          listings:
                            type: array
                            items: { $ref: "#/components/schemas/Listing" }
        "429": { $ref: "#/components/responses/TooManyRequests" }

  /api/listings/slug/{slug}:
    get:
      tags: [Listings]
      summary: Get a listing by its URL slug
      operationId: listingsShowBySlug
      security: []
      parameters:
        - $ref: "#/components/parameters/slug"
      responses:
        "200":
          description: Listing detail (with reviews and owner)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          listing: { $ref: "#/components/schemas/Listing" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/listings/{id}:
    parameters:
      - $ref: "#/components/parameters/listingId"

    get:
      tags: [Listings]
      summary: Get a single listing (with reviews and owner)
      operationId: listingsShow
      security: []
      responses:
        "200":
          description: Listing detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          listing: { $ref: "#/components/schemas/Listing" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }

    put:
      tags: [Listings]
      summary: Full-replace a listing (owner or admin)
      operationId: listingsUpdate
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - "listing[title]"
                - "listing[description]"
                - "listing[location]"
                - "listing[country]"
                - "listing[price]"
                - "listing[category]"
              properties:
                "listing[title]": { type: string, minLength: 1, maxLength: 100 }
                "listing[description]": { type: string, minLength: 1 }
                "listing[location]": { type: string, minLength: 1 }
                "listing[country]": { type: string, minLength: 1 }
                "listing[price]": { type: number, minimum: 0 }
                "listing[category]":
                  { $ref: "#/components/schemas/ListingCategory" }
                "listing[image]":
                  {
                    type: string,
                    format: binary,
                    description: "Optional — omit to keep existing primary image",
                  }
      responses:
        "200":
          description: Listing updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          listing: { $ref: "#/components/schemas/Listing" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }

    patch:
      tags: [Listings]
      summary: Partially update a listing (owner or admin)
      operationId: listingsPartialUpdate
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                listing: { $ref: "#/components/schemas/ListingPatchInput" }
          multipart/form-data:
            schema:
              type: object
              properties:
                "listing[title]": { type: string, minLength: 1 }
                "listing[description]": { type: string, minLength: 1 }
                "listing[location]": { type: string, minLength: 1 }
                "listing[country]": { type: string, minLength: 1 }
                "listing[price]": { type: number, minimum: 0 }
                "listing[category]":
                  { $ref: "#/components/schemas/ListingCategory" }
                "listing[image]": { type: string, format: binary }
      responses:
        "200":
          description: Listing patched
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          listing: { $ref: "#/components/schemas/Listing" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

    delete:
      tags: [Listings]
      summary: Delete a listing (owner or admin)
      description: Cascades to delete all associated Cloudinary images.
      operationId: listingsDestroy
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Listing deleted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          message:
                            {
                              type: string,
                              example: "Listing deleted successfully",
                            }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/listings/{id}/publish:
    post:
      tags: [Listings]
      summary: Publish a draft listing (owner or admin)
      description: "Sets `draft: false` and `status: active`."
      operationId: listingsPublish
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/listingId"
      responses:
        "200":
          description: Listing published
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          listing: { $ref: "#/components/schemas/Listing" }
                          message:
                            { type: string, example: "Listing published" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/listings/{id}/unpublish:
    post:
      tags: [Listings]
      summary: Move a listing back to draft (owner or admin)
      description: "Sets `draft: true`. Hides the listing from public results."
      operationId: listingsUnpublish
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/listingId"
      responses:
        "200":
          description: Listing moved to drafts
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          listing: { $ref: "#/components/schemas/Listing" }
                          message:
                            { type: string, example: "Listing moved to drafts" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/listings/{id}/featured:
    patch:
      tags: [Listings]
      summary: Set or unset the featured flag (admin only)
      operationId: listingsSetFeatured
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/listingId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [featured]
              properties:
                featured:
                  type: boolean
                  example: true
      responses:
        "200":
          description: Featured flag updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          listing: { $ref: "#/components/schemas/Listing" }
                          message: { type: string, example: "Listing featured" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/listings/{id}/images:
    post:
      tags: [Listings]
      summary: Add one or more images to a listing (owner or admin)
      description: Accepts up to 10 images per request. The first image is set as primary if no primary image exists.
      operationId: listingsAddImages
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/listingId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [images]
              properties:
                images:
                  type: array
                  items:
                    type: string
                    format: binary
                  maxItems: 10
                  description: JPEG, JPG, PNG, or WebP files (≤ 10 MB each)
      responses:
        "201":
          description: Images added
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          listing: { $ref: "#/components/schemas/Listing" }
                          message:
                            {
                              type: string,
                              example: "Images added successfully",
                            }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/listings/{id}/images/{imageId}:
    delete:
      tags: [Listings]
      summary: Remove an image from a listing (owner or admin)
      description: Also deletes the image from Cloudinary. A listing must retain at least one image.
      operationId: listingsRemoveImage
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/listingId"
        - $ref: "#/components/parameters/imageId"
      responses:
        "200":
          description: Image removed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          listing: { $ref: "#/components/schemas/Listing" }
                          message:
                            {
                              type: string,
                              example: "Image removed successfully",
                            }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/listings/{id}/images/{imageId}/primary:
    patch:
      tags: [Listings]
      summary: Set an image as the primary image (owner or admin)
      description: "Clears `isPrimary` on all other images and sets it on the specified image."
      operationId: listingsSetPrimaryImage
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/listingId"
        - $ref: "#/components/parameters/imageId"
      responses:
        "200":
          description: Primary image updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          listing: { $ref: "#/components/schemas/Listing" }
                          message:
                            { type: string, example: "Primary image updated" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/listings/{id}/availability:
    post:
      tags: [Listings]
      summary: Block a date range on the availability calendar (owner or admin)
      description: |
        `startDate` must be before `endDate`. Validation is enforced by the
        service layer in addition to Zod schema validation.
      operationId: listingsAddBlockedDate
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/listingId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BlockedDateInput" }
      responses:
        "201":
          description: Dates blocked
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          listing: { $ref: "#/components/schemas/Listing" }
                          message:
                            {
                              type: string,
                              example: "Dates blocked successfully",
                            }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /api/listings/{id}/availability/{blockedDateId}:
    delete:
      tags: [Listings]
      summary: Remove a blocked date range (owner or admin)
      operationId: listingsRemoveBlockedDate
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/listingId"
        - $ref: "#/components/parameters/blockedDateId"
      responses:
        "200":
          description: Blocked date removed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          listing: { $ref: "#/components/schemas/Listing" }
                          message:
                            { type: string, example: "Blocked date removed" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ════════════════════════════════ REVIEWS ═══════════════════════════════════
  /api/listings/{listingId}/reviews:
    parameters:
      - $ref: "#/components/parameters/listingIdNested"

    get:
      tags: [Reviews]
      summary: List all reviews for a listing
      operationId: reviewsIndex
      security: []
      responses:
        "200":
          description: Review array
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          reviews:
                            type: array
                            items: { $ref: "#/components/schemas/Review" }
        "404": { $ref: "#/components/responses/NotFound" }

    post:
      tags: [Reviews]
      summary: Add a review to a listing (auth required)
      description: Subject to the create rate limit (30/hr per IP).
      operationId: reviewsCreate
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [review]
              properties:
                review: { $ref: "#/components/schemas/ReviewInput" }
      responses:
        "201":
          description: Review created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          review: { $ref: "#/components/schemas/Review" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /api/listings/{listingId}/reviews/{reviewId}:
    parameters:
      - $ref: "#/components/parameters/listingIdNested"
      - $ref: "#/components/parameters/reviewId"

    get:
      tags: [Reviews]
      summary: Get a single review
      operationId: reviewsShow
      security: []
      responses:
        "200":
          description: Review detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          review: { $ref: "#/components/schemas/Review" }
        "404": { $ref: "#/components/responses/NotFound" }

    patch:
      tags: [Reviews]
      summary: Update a review (author or admin)
      operationId: reviewsUpdate
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                review: { $ref: "#/components/schemas/ReviewPatchInput" }
      responses:
        "200":
          description: Review updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          review: { $ref: "#/components/schemas/Review" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }

    delete:
      tags: [Reviews]
      summary: Delete a review (author or admin)
      operationId: reviewsDestroy
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Review deleted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          message:
                            {
                              type: string,
                              example: "Review deleted successfully",
                            }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ═════════════════════════════════ USERS ════════════════════════════════════
  /api/users/{username}:
    parameters:
      - $ref: "#/components/parameters/username"

    get:
      tags: [Users]
      summary: Get a user's profile (public shape; full shape if self)
      operationId: usersProfile
      security: []
      responses:
        "200":
          description: |
            **Public** callers receive `UserPublic`.  
            **Authenticated owner** receives `UserFull` (includes email, phone, settings, linkedProviders, etc.).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user:
                            oneOf:
                              - $ref: "#/components/schemas/UserPublic"
                              - $ref: "#/components/schemas/UserFull"
        "404": { $ref: "#/components/responses/NotFound" }

    delete:
      tags: [Users]
      summary: Delete account (self or admin)
      description: Hard-deletes the account and cleans up the avatar from Cloudinary. Terminates the session.
      operationId: usersDestroy
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Account deleted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          message:
                            {
                              type: string,
                              example: "Account deleted successfully",
                            }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/users/{username}/profile:
    parameters:
      - $ref: "#/components/parameters/username"

    patch:
      tags: [Users]
      summary: Update profile fields (self only)
      description: "Allowed fields — `firstName`, `lastName`, `bio`, `phoneNumber`."
      operationId: usersUpdateProfile
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateProfileBody" }
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user: { $ref: "#/components/schemas/UserFull" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /api/users/{username}/avatar:
    parameters:
      - $ref: "#/components/parameters/username"

    put:
      tags: [Users]
      summary: Upload or replace avatar (self only)
      description: Replaces any existing avatar and deletes the old file from Cloudinary.
      operationId: usersUpdateAvatar
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [avatar]
              properties:
                avatar:
                  type: string
                  format: binary
                  description: JPEG, JPG, PNG, or WebP (≤ 10 MB)
      responses:
        "200":
          description: Avatar updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user: { $ref: "#/components/schemas/UserFull" }
                          message:
                            {
                              type: string,
                              example: "Avatar updated successfully",
                            }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

    delete:
      tags: [Users]
      summary: Remove avatar (self only)
      description: Sets avatar fields to null and deletes from Cloudinary.
      operationId: usersRemoveAvatar
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Avatar removed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user: { $ref: "#/components/schemas/UserFull" }
                          message: { type: string, example: "Avatar removed" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/users/{username}/settings:
    parameters:
      - $ref: "#/components/parameters/username"

    patch:
      tags: [Users]
      summary: Update account settings (self only)
      operationId: usersUpdateSettings
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateSettingsBody" }
      responses:
        "200":
          description: Settings updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          settings:
                            { $ref: "#/components/schemas/UserSettings" }
                          message: { type: string, example: "Settings updated" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /api/users/{username}/notifications:
    parameters:
      - $ref: "#/components/parameters/username"

    patch:
      tags: [Users]
      summary: Update notification preferences (self only)
      operationId: usersUpdateNotifications
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateNotificationsBody" }
      responses:
        "200":
          description: Notification preferences updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          notificationPreferences:
                            {
                              $ref: "#/components/schemas/NotificationPreferences",
                            }
                          message:
                            {
                              type: string,
                              example: "Notification preferences updated",
                            }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /api/users/{username}/role:
    parameters:
      - $ref: "#/components/parameters/username"

    patch:
      tags: [Users]
      summary: Change a user's role (admin only)
      operationId: usersChangeRole
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ChangeRoleBody" }
      responses:
        "200":
          description: Role changed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user: { $ref: "#/components/schemas/UserPublic" }
                          message:
                            { type: string, example: "Role changed to host" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /api/users/{username}/listings:
    parameters:
      - $ref: "#/components/parameters/username"

    get:
      tags: [Users]
      summary: Get all listings owned by a user
      operationId: usersListings
      security: []
      responses:
        "200":
          description: User's listings
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          listings:
                            type: array
                            items: { $ref: "#/components/schemas/Listing" }
        "404": { $ref: "#/components/responses/NotFound" }
